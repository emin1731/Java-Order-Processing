services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: java-orderprocessing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'   # host 5433 -> container 5432 (avoids seeder-postgres)
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'   # host 6380 -> container 6379 (avoids seeder-redis)

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - '5672:5672' # AMQP
      - '15672:15672' # Management UI

volumes:
  pg_data: