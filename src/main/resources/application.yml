server:
  port: 8081   # 8080 is used by the seeder project

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/java-orderprocessing
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6380

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  cache:
    type: redis

app:
  rabbitmq:
    queue: order.queue
    exchange: order.exchange
    routing-key: order.routing.key


